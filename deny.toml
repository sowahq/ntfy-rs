# cargo-deny configuration for ntfy-rs
# Run: cargo deny check

[graph]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
]

[output]
feature-depth = 1

# ── Security advisories ───────────────────────────────────────────────────────
[advisories]
# Fetch the RustSec advisory database on each check.
# Unmaintained crates produce a warning; vulnerabilities are errors.
version = 2
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
version = 2
# Permissive and copyleft licenses we're comfortable with.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "0BSD",                  # e.g. quoted_printable (via lettre)
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "CDLA-Permissive-2.0",  # webpki-roots (Mozilla CA bundle, via lettre/rustls)
    "OpenSSL",               # ring contains OpenSSL-licensed portions
]
confidence-threshold = 0.8

# ring has a custom license that cargo-deny can't auto-detect; clarify it.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true   # don't check the workspace root crate itself

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"   # warn on duplicate transitive versions
wildcards = "deny"           # no '*' version requirements
workspace-default-features = "allow"
external-default-features = "allow"

# Crates we explicitly do not want in the dependency tree.
deny = [
    # Use rustls instead of native-tls/openssl where possible.
    { crate = "native-tls", reason = "use rustls instead" },
    { crate = "openssl",    reason = "use rustls/aws-lc-rs instead" },
    { crate = "openssl-sys",reason = "use rustls/aws-lc-rs instead" },
]

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

